<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self'; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://669bbb0bf588f6.lhr.life; base-uri 'none'; form-action 'none'">
    <script async src="../loader.js?v=seqfix1" data-site-id="resumeleader" data-ingest-base-url="https://669bbb0bf588f6.lhr.life" data-recorder-script-url="../recorder.js?v=seqfix1"></script>
    <link rel="icon" type="image/svg+xml" href="../assets/images/favicon-10491ef9057d757d.svg">
    <link rel="stylesheet" href="../assets/styles/css2-33095772f2c6b87a.css">
    <title>Resume Builder - ResumeLeader</title>
    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        --text: rgba(0, 0, 0, .87);
        --muted: rgba(0, 0, 0, .58);
        --line: rgba(0, 0, 0, .1);
        --blue: #1f5de2;
        --green: #167c5c;
        --surface: #fff;
        --soft: #f5f7fb;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: "Outfit", Arial, sans-serif;
        color: var(--text);
        background: var(--soft);
      }

      body {
        display: flex;
        flex-direction: column;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .topbar {
        height: 72px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        padding: 0 32px;
        background: var(--surface);
        border-bottom: 1px solid var(--line);
      }

      .logo {
        width: 156px;
        height: auto;
        display: block;
      }

      .top-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .button {
        min-height: 44px;
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 0 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        white-space: nowrap;
      }

      .button.primary {
        color: #fff;
        background: var(--blue);
      }

      .button.secondary {
        color: var(--text);
        background: #fff;
        border-color: var(--line);
      }

      .workspace {
        flex: 1;
        display: grid;
        grid-template-columns: 260px minmax(360px, 1fr) minmax(340px, 520px);
        gap: 0;
        min-height: calc(100vh - 72px);
      }

      .steps {
        background: #fff;
        border-right: 1px solid var(--line);
        padding: 28px 24px;
      }

      .step {
        display: grid;
        grid-template-columns: 32px 1fr;
        gap: 12px;
        align-items: center;
        padding: 14px 0;
        color: var(--muted);
        font-weight: 600;
      }

      .step-index {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: #eef3ff;
        color: var(--blue);
        font-weight: 800;
      }

      .step.active {
        color: var(--text);
      }

      .step.active .step-index {
        color: #fff;
        background: var(--blue);
      }

      .editor {
        padding: 32px;
        overflow: auto;
      }

      .editor-header {
        max-width: 720px;
        margin-bottom: 24px;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--green);
        font-size: 14px;
        font-weight: 800;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 34px;
        line-height: 1.15;
      }

      .intro {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .form-panel,
      .preview-panel {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .form-panel {
        max-width: 720px;
        padding: 24px;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      label {
        display: grid;
        gap: 8px;
        color: var(--muted);
        font-size: 14px;
        font-weight: 700;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px 14px;
        color: var(--text);
        font: inherit;
        background: #fff;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      .wide {
        grid-column: 1 / -1;
      }

      .preview-shell {
        padding: 32px;
        background: #eef1f6;
        border-left: 1px solid var(--line);
        overflow: auto;
      }

      .preview-panel {
        padding: 18px;
      }

      .preview-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .preview-title {
        font-weight: 800;
      }

      .resume-preview {
        width: min(100%, 360px);
        display: block;
        margin: 0 auto;
        border-radius: 4px;
        box-shadow: 0 22px 70px rgba(0, 0, 0, .18);
      }

      @media (max-width: 1100px) {
        .workspace {
          grid-template-columns: 220px minmax(0, 1fr);
        }

        .preview-shell {
          grid-column: 1 / -1;
          border-left: 0;
          border-top: 1px solid var(--line);
        }
      }

      @media (max-width: 760px) {
        .topbar {
          height: auto;
          padding: 18px;
          align-items: flex-start;
          flex-direction: column;
        }

        .top-actions {
          width: 100%;
          display: grid;
          grid-template-columns: 1fr 1fr;
        }

        .button {
          width: 100%;
        }

        .workspace {
          display: block;
        }

        .steps {
          display: flex;
          overflow-x: auto;
          gap: 18px;
          border-right: 0;
          border-bottom: 1px solid var(--line);
          padding: 16px 18px;
        }

        .step {
          min-width: max-content;
          padding: 0;
        }

        .editor,
        .preview-shell {
          padding: 20px 18px;
        }

        h1 {
          font-size: 28px;
        }

        .field-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <script defer src="../assets/navigation.js"></script>
  </head>
  <body>
    <header class="topbar">
      <a href="../" aria-label="ResumeLeader home">
        <img class="logo" src="../assets/images/logo.gfid4nra-475c81979c1b2ecc.svg" alt="ResumeLeader">
      </a>
      <div class="top-actions">
        <a class="button secondary" href="../choose-template/">Back to templates</a>
        <button class="button primary" type="button">Download PDF</button>
      </div>
    </header>

    <main class="workspace">
      <aside class="steps" aria-label="Resume builder steps">
        <div class="step"><span class="step-index">1</span><span>Choose template</span></div>
        <div class="step active"><span class="step-index">2</span><span>Build resume</span></div>
        <div class="step"><span class="step-index">3</span><span>Download</span></div>
      </aside>

      <section class="editor" aria-label="Resume editor">
        <div class="editor-header">
          <p class="eyebrow">Resume Builder</p>
          <h1>Build your resume</h1>
          <p class="intro">Add the essentials, keep the selected template, and continue editing from one focused workspace.</p>
        </div>

        <form class="form-panel">
          <div class="field-grid">
            <label>
              First name
              <input value="Alex" aria-label="First name">
            </label>
            <label>
              Last name
              <input value="Morgan" aria-label="Last name">
            </label>
            <label class="wide">
              Target role
              <input value="Product Designer" aria-label="Target role">
            </label>
            <label class="wide">
              Professional summary
              <textarea aria-label="Professional summary">Product designer with experience turning complex workflows into clear, polished user experiences.</textarea>
            </label>
            <label class="wide">
              Key skills
              <input value="UX research, design systems, prototyping, stakeholder collaboration" aria-label="Key skills">
            </label>
          </div>
        </form>
      </section>

      <aside class="preview-shell" aria-label="Resume preview">
        <div class="preview-panel">
          <div class="preview-toolbar">
            <span class="preview-title">Strassburg template</span>
            <a class="button secondary" href="../">Start over</a>
          </div>
          <img class="resume-preview" src="../choose-template/assets/images/strassburg-black-nophoto-1column.d15hxvk7-4e2323ea5d1cf2c2.png" alt="Selected resume template preview">
        </div>
      </aside>
    </main>
  </body>
</html>
